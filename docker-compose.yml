services:
  algo:
    build: .
    # Per-stack name so two accounts can run side-by-side on one host
    # (e.g. CONTAINER_NAME=okx_signal in this stack's .env, while the
    # plain stack keeps the default). Defaults preserve single-stack setups.
    container_name: ${CONTAINER_NAME:-okx_0dte_straddle}
    restart: always
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=UTC
      - ENTRY_NOW=${ENTRY_NOW:-false}
    volumes:
      - ./state:/app/state
      - ./logs:/app/logs
      - ./.env:/app/.env
      # External trade-gate signal (read-only). The vsn-vol-forecaster
      # writes here on the host; the algo only reads it. Path inside the
      # container is /app/signals → config.TRADE_GATE_FILE defaults to
      # signals/trade_gate.json. Only consulted when TRADE_GATE_ENABLED=true.
      - /opt/tft/vsn-vol-forecaster/signals:/app/signals:ro
